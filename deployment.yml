apiVersion: apps/v1
kind: Deployment
metadata:
  name: flask-chatbot
spec:
  replicas: 2
  selector:
    matchLabels:
      app: flask-chatbot
  template:
    metadata:
      labels:
        app: flask-chatbot
    spec:
      containers:
        - name: flask-chatbot
          image: flask-chatbot:latest
          imagepullpolicy: Never
          ports:
            - containerPort: 5000

---

apiVersion: v1
kind: Service
metadata:
  name: flask-chatbot-service
spec:
  type: LoadBalancer
  selector:
    app: flask-chatbot
  ports:
    - port: 80
      targetPort: 5000
